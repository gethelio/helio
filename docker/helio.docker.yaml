# Helio Docker configuration
#
# This config is used by docker-compose.yml. It demonstrates governance
# with a mix of policies: read-only tools are allowed, destructive tools
# are denied, sending email requires approval, and everything else falls
# through to the default (allow).
#
# The `send_email` rule routes to the dashboard approval channel, so calling
# that tool makes the approvals page populate at http://localhost:3100.
#
# Sections follow the canonical request-lifecycle order from
# docs/configuration.md: upstream, listen, policies, approval, audit,
# dashboard.

version: '1'

upstream:
  url: 'http://mcp-server:8080/mcp'
  transport: streamable-http

listen:
  port: 3000
  host: '0.0.0.0'

policies:
  default: allow
  rules:
    # Sending email pauses for human approval in the dashboard.
    - name: approve-send-email
      match:
        tool: 'send_email'
      action: require_approval
      approval:
        channel: dashboard

    - name: block-destructive
      match:
        annotations:
          destructiveHint: true
      action: deny
      feedback:
        message: 'Destructive actions are blocked by policy.'
        suggestion: 'Use a non-destructive alternative or request approval.'

    - name: allow-reads
      match:
        annotations:
          readOnlyHint: true
      action: allow

approval:
  timeout: 120s
  default_on_timeout: deny
  channels:
    - type: dashboard

audit:
  storage: sqlite
  path: /data/helio-audit.db
  retention: 90d
  include_responses: true

dashboard:
  enabled: true
  port: 3100
  host: '0.0.0.0'
  # Required whenever `flag_destructive: require_approval` or any
  # `require_approval` rule is used. Plumbed in through docker-compose via
  # the HELIO_DASHBOARD_SECRET env var. Generate with: openssl rand -hex 32
  api_secret: '${HELIO_DASHBOARD_SECRET}'
