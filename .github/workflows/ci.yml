name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: bash ./scripts/secret-scan-ci.sh

  ci:
    name: Docs, Audit, Lint, Typecheck, Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python SDK + test dependencies
        run: pip install -e './packages/python-sdk[dev]'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Supply-chain audit. Full-tree (dev + build + transitive) on every push to
      # main and on release (release.yml). On a pull_request it runs ONLY when the
      # PR changes a dependency manifest — so an unrelated feature PR is not blocked
      # by a newly-published advisory on a dep it never touched. Safe because, with
      # `--frozen-lockfile`, an unchanged manifest means an unchanged installed tree
      # (nothing new to audit), and that standing tree is still covered by the
      # main-push audit, the release audit, the daily Security Audit workflow, and
      # Dependabot security updates. Fails CLOSED: any uncertainty runs the audit.
      - name: Audit dependencies
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # GitHub runs `shell: bash` with `-e` (errexit); disable it so the
          # no-match `grep` (rc=1, the skip case) doesn't abort before we read
          # `rc`. Exit codes are handled explicitly below (rc checks + exit $?),
          # and the audit's own failure still propagates via `run_audit; exit $?`.
          set -uo pipefail
          set +e
          run_audit() {
            echo "Running full-tree dependency audit (pnpm audit --audit-level=high)"
            pnpm audit --audit-level=high
          }
          if [ "$EVENT_NAME" != "pull_request" ]; then
            run_audit; exit $?
          fi
          if [ -z "${BASE_SHA:-}" ]; then
            echo "::notice::No PR base SHA available — running full audit (fail-closed)."
            run_audit; exit $?
          fi
          if ! changed="$(git diff --name-only "$BASE_SHA" HEAD 2>/dev/null)"; then
            echo "::notice::Could not compute changed files — running full audit (fail-closed)."
            run_audit; exit $?
          fi
          # Any file that can affect what `pnpm install` produces or executes:
          # declared/resolved deps (package.json, pnpm-lock.yaml, pnpm-workspace.yaml),
          # registry/install config (.npmrc), install hooks (.pnpmfile.cjs/.js/.mjs),
          # and applied patches (patches/**). Missing any of these would be a
          # fail-open (a PR could change the installed tree while the audit skips).
          # Branch on grep's exit code explicitly: 0 = matched (run), 1 = no match
          # (skip), anything else = grep error → run (fail-closed).
          printf '%s\n' "$changed" | grep -Eq '(^|/)(package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|\.npmrc|\.pnpmfile\.(c|m)?js)$|(^|/)patches/'
          rc=$?
          if [ "$rc" -eq 0 ]; then
            echo "Dependency manifest / install input changed in this PR — running full audit."
            run_audit; exit $?
          elif [ "$rc" -ne 1 ]; then
            echo "::notice::Manifest-change detection errored (grep rc=$rc) — running full audit (fail-closed)."
            run_audit; exit $?
          fi
          echo "::notice title=Dependency audit skipped::No dependency manifest or install input changed in this PR (package.json / pnpm-lock.yaml / pnpm-workspace.yaml / .npmrc / .pnpmfile.* / patches/). The full-tree audit is enforced on main, on release, and by the daily Security Audit workflow."

      - name: Build
        run: pnpm build

      # After Build on purpose: the config-samples half validates every shipped
      # sample through the built CLI (dist/cli.js + bundled dashboard assets).
      - name: Docs drift + config samples check
        run: pnpm docs:check:ci

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: helio:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate the demo config
        working-directory: docker
        run: |
          docker run --rm \
            -e HELIO_DASHBOARD_SECRET=ci-placeholder \
            -v "$PWD/helio.docker.yaml:/config/helio.yaml:ro" \
            helio:ci node packages/proxy/dist/cli.js validate -c /config/helio.yaml

      - name: Assert the missing-secret guard aborts with the documented message
        working-directory: docker
        run: |
          # With the secret unset, `docker compose config` must abort (non-zero)
          # AND print the documented remediation. Assert both, so neither the
          # fail-closed behavior nor the message can drift from the README.
          if out=$(docker compose --env-file /dev/null config 2>&1); then
            echo "guard did not fire: compose config exited 0 with the secret unset"
            echo "$out"
            exit 1
          fi
          if ! grep -q 'required variable HELIO_DASHBOARD_SECRET is missing' <<<"$out"; then
            echo "missing-secret guard message drifted from the README:"
            echo "$out"
            exit 1
          fi
          echo "ok: missing-secret guard aborts with the documented message"

      - name: Smoke test the compose stack
        working-directory: docker
        run: |
          echo "HELIO_DASHBOARD_SECRET=$(openssl rand -hex 32)" > .env
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up -d --no-build --wait --wait-timeout 120
          ../scripts/docker-smoke.sh

      - name: Tear down the compose stack
        if: always()
        working-directory: docker
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v || true
          rm -f .env
