# Cross-tool spend budgets configuration
#
# Two pots: an umbrella budget ($50 per session) shared by the Stripe and
# PayPal demo tools with break-glass approvals for overages, and a category
# cap ($15 per session) that only Stripe payments labeled
# content_distribution charge. See README.md for the full walkthrough.
#
# Sections follow the canonical order from docs/configuration.md:
# upstream, listen, policies, budgets, approval, audit, dashboard.

version: '1'

upstream:
  url: 'http://localhost:8080/mcp'
  transport: streamable-http

listen:
  port: 3000
  host: '127.0.0.1'

policies:
  default: allow
  rules:
    # Keep the deny rule scoped to destructive tools only — a broad deny
    # placed here would block payment calls before the budget gate ever
    # sees them (rules decide first, budgets deplete after).
    - name: block-destructive
      match:
        annotations:
          destructiveHint: true
      action: deny
      feedback:
        message: 'Destructive operations are blocked by policy.'
        suggestion: 'Use a non-destructive alternative or request manual action.'

    - name: allow-reads
      match:
        annotations:
          readOnlyHint: true
      action: allow

budgets:
  # One depleting pot per session, shared by every Stripe and PayPal tool.
  # Each contributor names the argument field that carries the amount.
  - name: agent-payments
    limit: 50
    currency: USD
    window: session # never replenishes on a timer; idle pots collect after 24h
    key: session
    on_exceed: require_approval # a breach raises a break-glass ticket
    approval:
      channel: dashboard
      # To route break-glass tickets to Slack instead, uncomment the slack
      # channel under approval.channels below and switch this to:
      # channel: slack
    contributors:
      - match:
          tool: 'stripe_*'
        field: '$.amount'
      - match:
          tool: 'paypal_*'
        field: '$.total'

  # Category cap: only Stripe payments labeled content_distribution charge
  # this pot. Unlabeled payments skip it — and still land in the umbrella
  # agent-payments pot above, which is the recommended pairing.
  - name: content-distribution
    limit: 15
    currency: USD
    window: session
    key: session
    on_exceed: deny # the category cap is a hard stop; the umbrella breaks glass
    contributors:
      - match:
          tool: 'stripe_*'
          input:
            '$.category':
              eq: 'content_distribution'
        field: '$.amount'

approval:
  timeout: 300s
  # Budget tickets ignore default_on_timeout — they always fail closed.
  default_on_timeout: deny
  channels:
    - type: dashboard
    # - type: slack
    #   bot_token: '${HELIO_SLACK_BOT_TOKEN}'
    #   signing_secret: '${HELIO_SLACK_SIGNING_SECRET}'
    #   channel: '${HELIO_SLACK_CHANNEL}'

audit:
  storage: sqlite
  path: ./helio-audit.db
  retention: 90d
  include_responses: true

dashboard:
  enabled: true
  port: 3100
  # Required whenever any budget uses `on_exceed: require_approval` (same
  # rule as `require_approval` rules). Generate a fresh secret with
  # `openssl rand -hex 32` and put it in `.env` as HELIO_DASHBOARD_SECRET
  # (see `.env.example`).
  api_secret: '${HELIO_DASHBOARD_SECRET}'
