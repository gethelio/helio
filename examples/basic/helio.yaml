# Basic Helio configuration
#
# Log everything, deny destructive operations, allow everything else.
# See README.md for a line-by-line walkthrough.

version: '1'

upstream:
  url: 'http://localhost:8080/mcp'
  transport: streamable-http

listen:
  port: 3000
  host: '127.0.0.1'

dashboard:
  enabled: true
  port: 3100
  # Local demo mode: allow unauthenticated dashboard access on loopback only.
  allow_open_mode: true

policies:
  default: allow
  flag_destructive: log
  rules:
    - name: block-destructive
      match:
        annotations:
          destructiveHint: true
      action: deny
      feedback:
        message: 'Destructive operations are blocked by policy.'
        suggestion: 'Use a non-destructive alternative or request manual action.'

    - name: allow-reads
      match:
        annotations:
          readOnlyHint: true
      action: allow

approval:
  timeout: 300s
  default_on_timeout: deny
  channels:
    - type: dashboard

audit:
  storage: sqlite
  path: ./helio-audit.db
  retention: 90d
  include_responses: true
